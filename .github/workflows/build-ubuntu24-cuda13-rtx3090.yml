name: Build llama-server Ubuntu 24.04 CUDA 13 RTX 3090

on:
  workflow_dispatch: # manual trigger only

env:
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

jobs:
  build:
    runs-on: ubuntu-latest
    container: nvidia/cuda:13.1.0-devel-ubuntu24.04

    steps:
      - name: Clone
        id: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y cmake build-essential ninja-build libssl-dev git

      - name: Build
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_RPATH='$ORIGIN' \
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
            -DCMAKE_CUDA_ARCHITECTURES=86 \
            -DGGML_CUDA=ON \
            -DGGML_NATIVE=OFF \
            -DGGML_AVX2=OFF \
            -DGGML_AVX512=OFF \
            -DGGML_BACKEND_DL=ON \
            -DLLAMA_BUILD_SERVER=ON \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_TOOLS=OFF
          cmake --build build --config Release -j $(nproc)

      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name

      - name: Pack artifacts
        run: |
          cp LICENSE ./build/bin/
          tar -czvf llama-${{ steps.tag.outputs.name }}-bin-ubuntu24-cuda13-rtx3090-x64.tar.gz \
            --transform "s,./,llama-${{ steps.tag.outputs.name }}/," \
            -C ./build/bin .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: llama-${{ steps.tag.outputs.name }}-bin-ubuntu24-cuda13-rtx3090-x64.tar.gz
          name: llama-bin-ubuntu24-cuda13-rtx3090-x64.tar.gz
